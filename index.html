<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <title>Army of Darkness: Defense Clone</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <main class="app">
      <section class="game-shell">
        <canvas id="game" width="960" height="720" aria-label="Army of Darkness style defense game"></canvas>

        <section class="battle-ui" aria-live="polite">
          <div class="top-ui">
            <div class="hero-status">
              <div class="hero-portrait"></div>
              <div class="hero-health">
                <div class="hero-health-fill" id="ash-bar"></div>
              </div>
              <button class="pause-btn" type="button" aria-label="Pause">II</button>
            </div>

            <div class="wave-track-wrap">
              <div class="wave-track-label">Wave <strong id="wave-value">1</strong></div>
              <div class="wave-track">
                <div class="wave-track-fill" id="wave-progress-fill"></div>
                <div class="horde-flag" id="horde-flag-1">☠</div>
                <div class="horde-flag" id="horde-flag-2">☠</div>
              </div>
            </div>
          </div>

          <div class="resource-row">
            <div class="resource-pill"><span>Iron</span><strong id="iron-value">0</strong></div>
            <div class="resource-pill"><span>Gold</span><strong id="gold-value">0</strong></div>
            <div class="resource-pill"><span>Enemies</span><strong id="enemies-value">0</strong></div>
            <div class="book-mini">
              <span>Book</span>
              <div class="book-mini-track">
                <div class="book-mini-fill" id="book-bar"></div>
              </div>
            </div>
          </div>
        </section>

        <div class="wave-victory-label" id="wave-victory-label">VICTORY</div>

        <section class="summon-controls" id="controls"></section>

        <section class="movement" id="movement">
          <button class="move-btn" id="move-left" data-move="left" aria-label="Move left">◀</button>
          <button class="move-btn" id="move-right" data-move="right" aria-label="Move right">▶</button>
        </section>

        <section class="ability-placeholders" aria-label="Ability placeholders">
          <button class="ability-slot" id="btn-boomstick" type="button">
            <span class="slot-name">Ability</span>
            <span class="slot-meta">Coming Soon</span>
          </button>
          <button class="ability-slot" id="btn-fortify" type="button">
            <span class="slot-name">Ability</span>
            <span class="slot-meta">Coming Soon</span>
          </button>
          <button class="ability-main" type="button" aria-label="Main ability placeholder">
            <span>✦</span>
          </button>
        </section>

        <section class="overlay visible" id="overlay">
          <div class="panel">
            <h1 id="overlay-title">Army of Darkness Defense</h1>
            <p id="overlay-subtitle">
              Hold the line, summon fighters, and keep the Necronomicon alive until dawn.
            </p>
            <button id="overlay-button">Start Defense</button>
          </div>
        </section>

        <section class="intermission-screen" id="intermission-screen">
          <div class="intermission-frame">
            <div class="intermission-top">
              <h2 id="intermission-wave">Wave 1</h2>
              <h1>UPGRADES</h1>
              <button class="menu-btn">MENU</button>
            </div>

            <div class="intermission-body">
              <aside class="left-nav">
                <button class="nav-item">Ash</button>
                <button class="nav-item">Troops</button>
                <button class="nav-item active">Castle</button>
              </aside>

              <section class="upgrade-board">
                <div class="upgrade-list" id="upgrade-list"></div>
              </section>
            </div>

            <div class="intermission-bottom">
              <div class="gold-box">
                <span class="coin">◎</span>
                <strong id="intermission-gold">0</strong>
              </div>
              <button class="buy-coins-btn">Buy Coins</button>
              <button class="continue-btn" id="intermission-continue">continue</button>
            </div>
          </div>
        </section>

        <section class="troop-select-screen" id="troop-select-screen">
          <div class="troop-select-frame">
            <header class="troop-select-top">
              <h1>Select Troops</h1>
              <div class="troop-select-wave" id="troop-select-wave">Wave 1</div>
              <button class="troop-back-btn" id="troop-select-back">BACK</button>
            </header>

            <div class="troop-select-body">
              <div class="troop-grid-wrap">
                <div class="troop-grid" id="troop-select-grid"></div>
              </div>
              <aside class="troop-side"></aside>
            </div>

            <footer class="troop-select-bottom">
              <div class="troop-note">
                Selected:
                <strong id="troop-select-count">0/5</strong>
              </div>
              <div class="troop-chosen" id="troop-select-chosen"></div>
              <button class="continue-btn troop-continue-btn" id="troop-select-continue">continue</button>
            </footer>
          </div>
        </section>
      </section>
    </main>

    <script src="game.js"></script>
  </body>
</html>
